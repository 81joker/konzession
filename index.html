<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚕 Konzession Trainer - K1, K2 & K3 - ULTIMATE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0066cc;
            --secondary: #764ba2;
            --success: #00aa44;
            --danger: #cc0000;
            --warning: #ffaa00;
            --info: #0099ff;
            --bg-light: #f5f5f5;
            --bg-white: #ffffff;
            --text-dark: #1a1a1a;
            --text-gray: #666666;
            --border-light: #dddddd;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark);
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: var(--bg-white);
            border-radius: 12px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
    
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 2rem;
            text-align: center;
        }
        .header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .header p { font-size: 0.95rem; opacity: 0.9; }
        .progress-section {
            background: var(--bg-light);
            padding: 1.5rem 2rem;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            width: 0%;
            transition: width 0.3s ease;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 0.8rem;
        }
        .stat-card {
            background: white;
            padding: 0.8rem;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            text-align: center;
        }
        .stat-card .label { font-size: 0.7rem; color: var(--text-gray); }
        .stat-card .value { font-size: 1.3rem; font-weight: bold; color: var(--primary); }
        .chapter-selector {
            background: var(--bg-light);
            padding: 1.5rem 2rem;
            border: 2px solid var(--border-light);
        }
        .chapter-buttons {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .chapter-btn {
            padding: 0.7rem 1.2rem;
            border: 2px solid var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            background: white;
            color: var(--primary);
            transition: all 0.3s;
        }
        .chapter-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.3);
        }
        .tabs {
            display: flex;
            background: var(--bg-light);
            border-bottom: 2px solid var(--border-light);
            overflow-x: auto;
            flex-wrap: wrap;
        }
        .tab {
            flex: 1;
            min-width: 80px;
            padding: 0.8rem;
            text-align: center;
            cursor: pointer;
            border: none;
            background: transparent;
            font-size: 0.85rem;
            color: var(--text-gray);
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            font-weight: 500;
        }
        .tab.active {
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        .content {
            padding: 1.5rem;
            display: none;
            max-height: 70vh;
            overflow-y: auto;
        }
        .content.active { display: block; }
        .section {
            background: var(--bg-light);
            border-left: 5px solid var(--primary);
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-radius: 8px;
        }
        .section h2 {
            color: var(--primary);
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }
        .section h3 {
            color: var(--text-dark);
            margin: 0.8rem 0 0.4rem 0;
            font-size: 0.95rem;
        }
        .section p, .section li {
            line-height: 1.5;
            margin-bottom: 0.4rem;
            color: var(--text-gray);
            font-size: 0.9rem;
        }
        .section ul { margin-left: 1.5rem; }
        .question-card {
            background: white;
            border: 2px solid var(--warning);
            border-left: 5px solid var(--warning);
            padding: 1rem;
            margin-bottom: 0.8rem;
            border-radius: 8px;
        }
        .question-card h3 {
            color: var(--warning);
            margin-bottom: 0.7rem;
            font-size: 0.85rem;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .option {
            display: flex;
            align-items: flex-start;
            padding: 0.6rem;
            border: 2px solid var(--border-light);
            border-radius: 6px;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        .option:hover {
            background: var(--bg-light);
            border-color: var(--primary);
        }
        .option input[type="radio"] {
            margin-right: 0.6rem;
            margin-top: 0.15rem;
        }
        .result {
            margin-top: 0.6rem;
            padding: 0.8rem;
            border-radius: 6px;
            border-left: 4px solid;
            font-size: 0.8rem;
        }
        .result.correct {
            background: #f0f8f0;
            border-left-color: var(--success);
            color: #006622;
        }
        .result.incorrect {
            background: #fef0f0;
            border-left-color: var(--danger);
            color: #660000;
        }
        .exercise-card {
            background: white;
            border: 2px solid #2196F3;
            border-left: 5px solid #2196F3;
            padding: 1rem;
            margin-bottom: 0.8rem;
            border-radius: 8px;
        }
        .exercise-card h3 {
            color: #2196F3;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
        }
        .exercise-card p {
            font-size: 0.85rem;
            margin: 0.4rem 0;
            color: var(--text-gray);
        }
        .solution-box {
            background: #f0f8f0;
            border-left: 4px solid var(--success);
            padding: 0.8rem;
            margin-top: 0.6rem;
            border-radius: 6px;
            display: none;
            font-family: monospace;
            font-size: 0.8rem;
            color: #006622;
        }
        .solution-box.show { display: block; }
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .metric-item {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1.2rem;
            border-radius: 8px;
            text-align: center;
        }
        .metric-item .label { font-size: 0.7rem; opacity: 0.9; }
        .metric-item .value { font-size: 1.6rem; font-weight: bold; margin-top: 0.3rem; }
        .footer {
            background: var(--bg-light);
            padding: 1rem 2rem;
            text-align: center;
            border-top: 2px solid var(--border-light);
            font-size: 0.8rem;
            color: var(--text-gray);
        }
        .calculator-box {
            background: white;
            border: 2px solid var(--info);
            border-left: 5px solid var(--info);
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-radius: 8px;
        }
        input[type="number"] {
            width: 100%;
            padding: 0.6rem;
            margin: 0.5rem 0;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .calc-result {
            background: #f0f8f0;
            border-left: 4px solid var(--success);
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 6px;
            color: #006622;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="header">
            <h1>🚕 Konzession Trainer</h1>
            <p>Theorie + 110+ Fragen + 30 Schwere Aufgaben + Rechner + Fortschritt</p>
        </div>

        <div class="progress-section">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="stat-grid">
                <div class="stat-card"><div class="label">Kapitel</div><div class="value" id="chapterStat">1/3</div></div>

                <div class="stat-card"><div class="label">📝 Aufgaben</div><div class="value" id="exStat">0/30</div></div>
                <div class="stat-card"><div class="label">✓ Richtig</div><div class="value" id="okStat">0%</div></div>

                <button class="chapter-btn" onclick="switchChapter(2)">K2: Bilanz (45)</button>
                <button class="chapter-btn" onclick="switchChapter(3)">K3: Lohnverrechnung (25)</button>

        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('theory')">📚 Theorie</button>
            <button class="tab" onclick="switchTab('questions')">❓ Fragen</button>
            <button class="tab" onclick="switchTab('exercises')">📝 Aufgaben</button>
            <button class="tab" onclick="switchTab('calculator')">🔢 Rechner</button>
            <button class="tab" onclick="switchTab('progress')">📊 Fortschritt</button>
        </div>

        <div id="theory" class="content active"><div id="theoryContent"></div></div>
        <div id="questions" class="content"><div id="questionsContainer"></div></div>
        <div id="exercises" class="content"><div id="exercisesContainer"></div></div>
        <div id="calculator" class="content"><div id="calculatorContent"></div></div>
        <div id="progress" class="content">
            <div id="progressMetrics"></div>
            <button class="btn btn-danger" onclick="resetProgress()" style="width: 100%; padding: 0.8rem; margin-top: 1rem;">Fortschritt Zurücksetzen</button>
        </div>

        <div class="footer">Nehad Altimimi © 2026</div>
    </div>

                {id: 'k3ex6', level: '⭐⭐⭐⭐⭐', title: 'Pendelerpauschale-Wirkung', q: 'Brutto €2.8K, PP €350. LSt normal €190. Mit PP?', sol: 'Pauschale mindert NUR LSt (NICHT Auszahlung!) | LSt_neu ≈ €190 − €350 = <b>0 LSt</b> | Auszahlung bleibt €2.8K!', f: 'Pauschale reduziert LSt direkt, nicht Netto'},
                {id: 'k3ex7', level: '⭐⭐⭐⭐⭐', title: 'Tarifzonen-Berechnung', q: 'DN wohnt 55km. Klein-PP: 40−60km = €214/Mo. Brutto €2K. DB 3,70% + DZ 0,36%. AG-Kosten?', sol: 'DB: €2K × 3,70% = €74 | DZ: €2K × 0,36% = €7,20 | Ges: <b>€81,20/Mo</b>', f: 'AG trägt DB + DZ auf Brutto'},
                {id: 'k3ex8', level: '⭐⭐⭐⭐⭐', title: 'Kleinunternehmer-Grenze', q: 'Mini-Job €1.1K/Mo. Abgaben? DB 3,70%, DZ 0,36%, Komm 3%. (FB: €1.095, FG: €1.095−€1.460)', sol: 'FREIGRENZE! (€1.1K − €1.095) = €5 × 7,06% = <b>€0,35</b> (fast nichts!)', f: 'Bis €1.095 FREI | €1.095−€1.460: nur Differenz'},
                {id: 'k3ex9', level: '⭐⭐⭐⭐⭐', title: 'Jahresabrechnung-Freigrenze', q: 'Jan−Nov: €900/Mo. Dez (13. Gehalt): €2.5K. Abgaben? (DB+DZ+Komm ~7,06%)', sol: 'Monatlich €900 = FB (0%) | Dez €2.5K = FG, (€2.5K − €1.460) × 7,06% ≈ €73 | <b>Jahresabgaben ≈ €73</b>', f: 'Variiert monatlich, Jahresverrechnung'},
                {id: 'k3ex10', level: '⭐⭐⭐⭐⭐', title: 'Personalkosten-Kalkulation', q: 'Unternehmer braucht €3K Netto. Wie viel Brutto mit Abgaben? (AN: LSt+SV ≈21%, AG: +17% zusätzlich)', sol: 'Netto €3K → Brutto ≈ €3K÷0,79 ≈ €3.797 | AG-Kosten: €3.797 × 1,17 ≈ <b>€4.442/Monat</b> Gesamtkosten', f: 'Kosten = Netto÷(1−SV%)×(1+AG%)'},
            ],
        };

        // ==================== THEORIE ====================
        const theory = {
            1: `
                <div class="section">
                    <h2>📖 Kapitel 1: Rechnungswesen</h2>
                    <h3>Grundlagen Buchführung</h3>
                    <ul>
                        <li><strong>Rechnungswesen:</strong> Buchführung + Kostenrechnung + Statistik + Finanzierung</li>
                        <li><strong>Aufbewahrung:</strong> 7 Jahre</li>
                        <li><strong>Grundregel:</strong> Keine Buchung ohne Beleg</li>
                        <li><strong>Belege:</strong> ER (Eingangsrechnung), K (Kassabeleg), AR (Ausgangsrechnung)</li>
                    </ul>
                    <h3>Tageslosung (Direkt & Indirekt)</h3>
                    <p>Direkt: Kassenende − Kassenstart = Tageslosung</p>
                    <p>Indirekt: Mit Ausgänge + Eingänge rechnen</p>
                    <h3>Abschreibung (AfA)</h3>
                    <ul>
                        <li><strong>Linear:</strong> Preis ÷ Jahre</li>
                        <li><strong>Degressive:</strong> Restbuchwert × %</li>
                        <li><strong>Taxi-Standard:</strong> 5 Jahre</li>
                        <li><strong>GWG:</strong> Unter €1.000 sofort</li>
                    </ul>
                    <h3>Gewinnberechnung (EAR)</h3>
                    <p>Gewinn = Einnahmen − Ausgaben − AfA</p>
                    <p><strong>Wichtig:</strong> Private Entnahmen NICHT abgezogen!</p>
                    <h3>Pauschalierung & USt</h3>
                    <ul>
                        <li><strong>Pauschalierung:</strong> Bis €420K Umsatz</li>
                        <li><strong>Taxi-Pauschale:</strong> 20% der Umsatzerlöse</li>
                        <li><strong>USt 20%:</strong> Brutto ÷ 1,2 = Netto</li>
                    </ul>
                </div>
            `,
            2: `
                <div class="section">
                    <h2>📊 Kapitel 2: Doppelte Buchführung & Bilanzierung</h2>
                    <h3>Bilanzgleichung</h3>
                    <p><strong>Aktiva = Passiva</strong> (Vermögen = Schulden + EK)</p>
                    <h3>Aktiva & Passiva</h3>
                    <ul>
                        <li><strong>Aktiva (linke Seite):</strong> Anlagevermögen (Taxi, Gebäude) + Umlaufvermögen (Kassa, Bank)</li>
                        <li><strong>Passiva (rechte Seite):</strong> Eigenkapital (EK) + Fremdkapital (FK: Langfristig + Kurzfristig)</li>
                    </ul>
                    <h3>Wichtige Kennzahlen</h3>
                    <ul>
                        <li><strong>Verschuldungsgrad:</strong> (FK × 100) / GK | Ideal: 30−40%</li>
                        <li><strong>Liquidität:</strong> (UV × 100) / KFK | Ideal: > 100%</li>
                        <li><strong>EK-Rentabilität:</strong> (Gewinn × 100) / EK</li>
                        <li><strong>Anlagendeckung:</strong> (EK + LFK) × 100 / AV | Ideal: > 150%</li>
                        <li><strong>Cash-Flow:</strong> Gewinn + AfA (AfA ist keine Zahlung!)</li>
                    </ul>
                    <h3>GuV-Rechnung</h3>
                    <p>Erlöse − Aufwendungen (inkl. AfA) = Gewinn</p>
                </div>
            `,
            3: `
                <div class="section">
                    <h2>💰 Kapitel 3: Lohnverrechnung (Nach Personalrechnung.png)</h2>
                    <h3>Grundformeln</h3>
                    <p><strong>Brutto = Laufender + ÜST + Sonderzahlung</strong></p>
                    <p><strong>Netto = Brutto − SV − Lohnsteuer</strong></p>
                    <h3>Lohnsteuerfrei Bezüge</h3>
                    <ul>
                        <li>Sonderzahlung: bis €620</li>
                        <li>Erste 15 ÜST (50%): bis €170</li>
                        <li>Weitere ÜST (100%): bis €400</li>
                        <li>Kilometergeld</li>
                    </ul>
                    <h3>Überstunden (ÜST-Teiler)</h3>
                    <ul>
                        <li><strong>Taxi (mit Taxischein):</strong> 55 h × 4,33 = 238 Stunden</li>
                        <li><strong>Angestellte:</strong> 38 h × 4,33 = 165 Stunden</li>
                        <li><strong>Arbeiter:</strong> 40 h × 4,33 = 173 Stunden</li>
                        <li><strong>Erste 15:</strong> 50% Zuschlag</li>
                        <li><strong>Ab 15:</strong> 100% Zuschlag</li>
                        <li><strong>Sonntag/Feiertag:</strong> 100% Zuschlag</li>
                    </ul>
                    <h3>Abgaben & Steuern</h3>
                    <ul>
                        <li><strong>Finanzamt:</strong> DB (3,70%), DZ (0,36%), Lohnsteuer</li>
                        <li><strong>SV (Gesundheitskassa):</strong> DN ~13,8%, AG 21,23%</li>
                        <li><strong>Gemeinde/Stadtkasse:</strong> Kommunalsteuer (3%), U-Bahn (€2/Woche)</li>
                        <li><strong>Abgabenfrist:</strong> 15. des Folge-Monats</li>
                    </ul>
                    <h3>Freibetrag vs Freigrenze</h3>
                    <ul>
                        <li><strong>Freibetrag (€1.095):</strong> KEINE Abgaben</li>
                        <li><strong>Freigrenze (€1.095−€1.460):</strong> NUR auf Differenz berechnen</li>
                    </ul>
                    <h3>Höchstbeitragsgrunlage</h3>
                    <p><strong>€6.930 pro Monat:</strong> SV-Beiträge nur bis diese Grenze!</p>
                    <h3>Pendelerpauschale</h3>
                    <p>Mindert <strong>NUR Lohnsteuer</strong>, nicht Auszahlung!</p>
                    <ul>
                        <li><strong>Klein-PP:</strong> 2−20km €0 | 20−40km €58 | 40−60km €113 | >60km €168</li>
                    </ul>
                </div>
            `,
        };

        let currentChapter = 1;
        let progress = JSON.parse(localStorage.getItem('konzeptionMaster') || '{"k1":{"q":0,"e":0},"k2":{"q":0,"e":0},"k3":{"q":0,"e":0}}');

        function switchChapter(ch) {
            currentChapter = ch;
            document.querySelectorAll('.chapter-btn').forEach(e => e.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('chapterStat').textContent = `${ch}/3`;
            renderTheory();
            renderQuestions();
            renderExercises();
            renderCalculator();
            updateStats();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.content').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function renderTheory() {
            document.getElementById('theoryContent').innerHTML = theory[currentChapter];
        }

        function renderQuestions() {
            const q = allQuestions[currentChapter];
            let html = '';
            q.forEach((qitem, i) => {
                html += `<div class="question-card">
                    <h3>F${i+1}/${q.length}: ${qitem.q}</h3>
                    <div class="options">
                        ${qitem.options.map((opt, j) => `
                            <label class="option">
                                <input type="radio" name="${qitem.id}" value="${j}" onchange="checkAnswer('${qitem.id}', ${j}, '${qitem.explanation.replace(/'/g, "\\'")}', '${currentChapter}')">
                                ${opt.text}
                            </label>
                        `).join('')}
                    </div>
                    <div id="result-${qitem.id}"></div>
                </div>`;
            });
            document.getElementById('questionsContainer').innerHTML = html;
        }

        function checkAnswer(qId, optIdx, explanation, ch) {
            const q = allQuestions[ch].find(x => x.id === qId);
            const isCorrect = q.options[optIdx].correct;
            const key = `k${ch}`;
            progress[key].q++;
            if (isCorrect) progress[key].q++;
            localStorage.setItem('konzeptionMaster', JSON.stringify(progress));
            
            const resultDiv = document.getElementById(`result-${qId}`);
            resultDiv.innerHTML = `<div class="result ${isCorrect ? 'correct' : 'incorrect'}">
                <strong>${isCorrect ? '✓ RICHTIG!' : '✗ FALSCH'}</strong><br>${explanation}
            </div>`;
            updateStats();
        }

        function renderExercises() {
            const ex = exercises[currentChapter];
            let html = '';
            ex.forEach(e => {
                html += `<div class="exercise-card">
                    <h3>${e.level} ${e.title}</h3>
                    <p><strong>Aufgabe:</strong> ${e.q}</p>
                    <button class="btn btn-primary" onclick="toggleSolution('${e.id}')">Lösung zeigen</button>
                    <div id="sol-${e.id}" class="solution-box">
                        <p><strong>Formel:</strong> ${e.f}</p>
                        <p><strong>Lösung:</strong> ${e.sol}</p>
                    </div>
                </div>`;
            });
            document.getElementById('exercisesContainer').innerHTML = html;
        }

        function toggleSolution(id) {
            document.getElementById(`sol-${id}`).classList.toggle('show');
            const key = `k${currentChapter}`;
            progress[key].e++;
            localStorage.setItem('konzeptionMaster', JSON.stringify(progress));
            updateStats();
        }

        function renderCalculator() {
            if (currentChapter === 1) {
                document.getElementById('calculatorContent').innerHTML = `
                    <div class="calculator-box">
                        <h3>Tageslosung Rechner</h3>
                        <label>Kassenstart (€):</label>
                        <input type="number" id="calc-start" placeholder="z.B. 200">
                        <label>Kassenende (€):</label>
                        <input type="number" id="calc-end" placeholder="z.B. 800">
                        <button class="btn btn-primary" onclick="calcTageslosung()" style="width: 100%; margin-top: 1rem;">Berechnen</button>
                        <div id="calc-result-tl"></div>
                    </div>
                    <div class="calculator-box">
                        <h3>AfA Rechner</h3>
                        <label>Anschaffungspreis (€):</label>
                        <input type="number" id="calc-price" placeholder="z.B. 60000">
                        <label>Nutzungsdauer (Jahre):</label>
                        <input type="number" id="calc-years" placeholder="z.B. 5">
                        <button class="btn btn-primary" onclick="calcAfA()" style="width: 100%; margin-top: 1rem;">Berechnen</button>
                        <div id="calc-result-afa"></div>
                    </div>
                `;
            } else if (currentChapter === 2) {
                document.getElementById('calculatorContent').innerHTML = `
                    <div class="calculator-box">
                        <h3>Kennzahlen Rechner</h3>
                        <label>Fremdkapital (€):</label>
                        <input type="number" id="calc-fk" placeholder="€">
                        <label>Gesamtkapital (€):</label>
                        <input type="number" id="calc-gk" placeholder="€">
                        <button class="btn btn-primary" onclick="calcKennzahl()" style="width: 100%; margin-top: 1rem;">Verschuldungsgrad</button>
                        <div id="calc-result-kz"></div>
                    </div>
                `;
            } else {
                document.getElementById('calculatorContent').innerHTML = `
                    <div class="calculator-box">
                        <h3>Lohnabrechnung Schnellrechner</h3>
                        <label>Brutto (€):</label>
                        <input type="number" id="calc-brutto" placeholder="€">
                        <label>SV Prozent (%):</label>
                        <input type="number" id="calc-sv" placeholder="13.8" value="13.8">
                        <label>LSt Prozent (%):</label>
                        <input type="number" id="calc-lst" placeholder="8" value="8">
                        <button class="btn btn-primary" onclick="calcLohn()" style="width: 100%; margin-top: 1rem;">Netto Berechnen</button>
                        <div id="calc-result-lohn"></div>
                    </div>
                `;
            }
        }

        function calcTageslosung() {
            const start = parseFloat(document.getElementById('calc-start').value) || 0;
            const end = parseFloat(document.getElementById('calc-end').value) || 0;
            const result = end - start;
            document.getElementById('calc-result-tl').innerHTML = `<div class="calc-result">Tageslosung: €${result.toFixed(2)}</div>`;
        }

        function calcAfA() {
            const price = parseFloat(document.getElementById('calc-price').value) || 0;
            const years = parseFloat(document.getElementById('calc-years').value) || 1;
            const afa = price / years;
            document.getElementById('calc-result-afa').innerHTML = `<div class="calc-result">Jahres-AfA: €${afa.toFixed(2)}</div>`;
        }

        function calcKennzahl() {
            const fk = parseFloat(document.getElementById('calc-fk').value) || 0;
            const gk = parseFloat(document.getElementById('calc-gk').value) || 1;
            const vg = (fk / gk * 100).toFixed(1);
            document.getElementById('calc-result-kz').innerHTML = `<div class="calc-result">Verschuldungsgrad: ${vg}%</div>`;
        }

        function calcLohn() {
            const brutto = parseFloat(document.getElementById('calc-brutto').value) || 0;
            const sv = parseFloat(document.getElementById('calc-sv').value) || 0;
            const lst = parseFloat(document.getElementById('calc-lst').value) || 0;
            const netto = brutto - (brutto * sv / 100) - (brutto * lst / 100);
            document.getElementById('calc-result-lohn').innerHTML = `<div class="calc-result">Netto: €${netto.toFixed(2)}</div>`;
        }

        function updateStats() {
            const total_q = 40 + 45 + 25;
            const total_e = 10 + 10 + 10;
            const answered_q = progress.k1.q + progress.k2.q + progress.k3.q;
            const solved_e = progress.k1.e + progress.k2.e + progress.k3.e;
            const percent = total_q > 0 ? Math.round((answered_q / total_q) * 100) : 0;
            
            document.getElementById('qStat').textContent = `${answered_q}/${total_q}`;
            document.getElementById('exStat').textContent = `${solved_e}/${total_e}`;
            document.getElementById('okStat').textContent = `${percent}%`;
            document.getElementById('progressFill').style.width = Math.round(((answered_q + solved_e) / (total_q + total_e)) * 100) + '%';
        }

        function renderProgress() {
            const k1_q = 40, k2_q = 45, k3_q = 25;
            const k1_e = 10, k2_e = 10, k3_e = 10;
            document.getElementById('progressMetrics').innerHTML = `
                <div class="metric-grid">
                    <div class="metric-item"><div class="label">K1 Fragen</div><div class="value">${progress.k1.q}/${k1_q}</div></div>
                    <div class="metric-item"><div class="label">K1 Aufgaben</div><div class="value">${progress.k1.e}/${k1_e}</div></div>
                    <div class="metric-item"><div class="label">K2 Fragen</div><div class="value">${progress.k2.q}/${k2_q}</div></div>
                    <div class="metric-item"><div class="label">K2 Aufgaben</div><div class="value">${progress.k2.e}/${k2_e}</div></div>
                    <div class="metric-item"><div class="label">K3 Fragen</div><div class="value">${progress.k3.q}/${k3_q}</div></div>
                    <div class="metric-item"><div class="label">K3 Aufgaben</div><div class="value">${progress.k3.e}/${k3_e}</div></div>
                </div>
            `;
        }

        function resetProgress() {
            if (confirm('Fortschritt wirklich löschen?')) {
                localStorage.removeItem('konzeptionMaster');
                location.reload();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTheory();
            renderQuestions();
            renderExercises();
            renderCalculator();
            updateStats();
        });
    </script>
</body>
</html>
