<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚕 Konzession Trainer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0066cc;
            --secondary: #764ba2;
            --success: #00aa44;
            --danger: #cc0000;
            --warning: #ffaa00;
            --info: #0099ff;
            --bg-light: #f5f5f5;
            --bg-white: #ffffff;
            --text-dark: #1a1a1a;
            --text-gray: #666666;
            --border-light: #dddddd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--bg-white);
            border-radius: 12px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }


        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .progress-section {
            background: var(--bg-light);
            padding: 1.5rem 2rem;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
        }

        .stat-card {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-card .label {
            font-size: 0.8rem;
            color: var(--text-gray);
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .chapter-selector {
            background: var(--bg-light);
            padding: 1.5rem 2rem;
            border-top: 2px solid var(--border-light);
            border-bottom: 2px solid var(--border-light);
        }

        .chapter-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .chapter-btn {
            padding: 1rem 2rem;
            border: 2px solid var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            background: white;
            color: var(--primary);
            transition: all 0.3s;
        }

        .chapter-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.3);
        }

        .chapter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.2);
        }

        .tabs {
            display: flex;
            background: var(--bg-light);
            border-bottom: 2px solid var(--border-light);
            overflow-x: auto;
            flex-wrap: wrap;
        }

        .tab {
            flex: 1;
            min-width: 100px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            color: var(--text-gray);
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            font-weight: 500;
        }

        .tab:hover {
            background: #f0f0f0;
            color: var(--primary);
        }

        .tab.active {
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .content {
            padding: 2rem;
            display: none;
        }

        .content.active {
            display: block;
        }

        .section {
            background: var(--bg-light);
            border-left: 5px solid var(--primary);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: 8px;
        }

        .section h2 {
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 1.4rem;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 0.5rem;
        }

        .section h3 {
            color: var(--text-dark);
            margin-top: 1.2rem;
            margin-bottom: 0.75rem;
        }

        .section p, .section li {
            line-height: 1.7;
            margin-bottom: 0.75rem;
            color: var(--text-gray);
        }

        .section ul {
            margin-left: 2rem;
            margin-bottom: 1rem;
        }

        .math-box {
            background: white;
            border: 3px solid var(--primary);
            padding: 1.2rem;
            border-radius: 8px;
            font-family: monospace;
            margin: 1rem 0;
            font-size: 0.95rem;
            line-height: 1.8;
        }

        .example-box {
            background: #f9fff0;
            border-left: 4px solid var(--success);
            padding: 1rem;
            margin: 0.5rem 0;
            border-radius: 4px;
        }

        .question-card {
            background: white;
            border: 2px solid var(--warning);
            border-left: 5px solid var(--warning);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: 8px;
        }

        .question-card h3 {
            color: var(--warning);
            margin-bottom: 1rem;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin: 1rem 0;
        }

        .option {
            display: flex;
            align-items: flex-start;
            padding: 1rem;
            border: 2px solid var(--border-light);
            border-radius: 6px;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
        }

        .option:hover {
            background: var(--bg-light);
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .option input[type="radio"] {
            margin-right: 1rem;
            margin-top: 0.3rem;
            width: 20px;
            height: 20px;
        }

        .result {
            margin-top: 1rem;
            padding: 1.2rem;
            border-radius: 6px;
            border-left: 5px solid;
            font-size: 0.95rem;
        }

        .result.correct {
            background: #f0f8f0;
            border-left-color: var(--success);
            color: #006622;
        }

        .result.incorrect {
            background: #fef0f0;
            border-left-color: var(--danger);
            color: #660000;
        }

        .exercise-card {
            background: white;
            border: 2px solid #2196F3;
            border-left: 5px solid #2196F3;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: 8px;
        }

        .exercise-card h3 {
            color: #2196F3;
            margin-bottom: 0.75rem;
        }

        .solution-box {
            background: #f0f8f0;
            border-left: 4px solid var(--success);
            padding: 1.2rem;
            margin-top: 1rem;
            border-radius: 6px;
            display: none;
            font-family: monospace;
            font-size: 0.95rem;
        }

        .solution-box.show {
            display: block;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 102, 204, 0.3);
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--bg-light);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #990000;
        }

        .tip-box {
            background: #fff3e0;
            border-left: 4px solid var(--warning);
            padding: 1rem;
            border-radius: 6px;
            margin: 1rem 0;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .metric-item {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }

        .metric-item .label {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-bottom: 0.5rem;
        }

        .metric-item .value {
            font-size: 2rem;
            font-weight: bold;
        }

        .calculator {
            background: #f9f9f9;
            border: 2px solid var(--primary);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .calculator-group {
            margin-bottom: 1.5rem;
        }

        .calculator-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .calculator-group input, .calculator-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            font-size: 1rem;
        }

        .calculator-result {
            background: #e6f0ff;
            padding: 1rem;
            border-radius: 6px;
            border-left: 4px solid var(--primary);
            font-weight: bold;
            margin-top: 1rem;
        }

        .comparison-table {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1rem 0;
        }

        .comparison-box {
            background: white;
            border: 2px solid var(--primary);
            padding: 1rem;
            border-radius: 6px;
        }

        .comparison-box h4 {
            color: var(--primary);
            margin-bottom: 0.75rem;
        }

        .table-responsive {
            overflow-x: auto;
            margin: 1rem 0;
        }

        .table-responsive table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .table-responsive th {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }

        .table-responsive td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-light);
        }

        .footer {
            background: var(--bg-light);
            padding: 1.5rem 2rem;
            text-align: center;
            border-top: 2px solid var(--border-light);
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .tab {
                min-width: 80px;
                padding: 0.75rem;
                font-size: 0.75rem;
            }

            .content {
                padding: 1rem;
            }

            .comparison-table {
                grid-template-columns: 1fr;
            }

            .chapter-buttons {
                flex-direction: column;
            }

            .chapter-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚕 Konzession Trainer</h1>
        </div>

        <div class="progress-section">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-grid">
                <div class="stat-card">
                    <div class="label">📚 Aktuel Kapitel</div>
                    <div class="value" id="chapterStat">1/2</div>
                </div>
                <div class="stat-card">
                    <div class="label">❓ Fragen</div>
                    <div class="value" id="questionsStat">0/65</div>
                </div>
                <div class="stat-card">
                    <div class="label">🧮 Aufgaben</div>
                    <div class="value" id="exercisesStat">0/35</div>
                </div>
                <div class="stat-card">
                    <div class="label">⭐ Erfolg</div>
                    <div class="value" id="successStat">0%</div>
                </div>
            </div>
        </div>

        <div class="chapter-selector">
            <div style="text-align: center; margin-bottom: 1rem;">
                <h3 style="color: var(--primary);">Wähle dein Kapitel:</h3>
            </div>
            <div class="chapter-buttons">
                <button class="chapter-btn active" onclick="switchChapter(1)">📖 Kapitel 1: Rechnungswesen</button>
                <button class="chapter-btn" onclick="switchChapter(2)">📊 Kapitel 2: Doppelte Buchführung</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('theory')">📚 Theorie</button>
            <button class="tab" onclick="switchTab('questions')">❓ Fragen</button>
            <button class="tab" onclick="switchTab('exercises')">🧮 Aufgaben</button>
            <button class="tab" onclick="switchTab('calculator')">🔢 Rechner</button>
            <button class="tab" onclick="switchTab('progress')">📊 Fortschritt</button>
        </div>

        <!-- THEORIE -->
        <div id="theory" class="content active">
            <div id="theoryContent"></div>
        </div>

        <!-- FRAGEN -->
        <div id="questions" class="content">
            <div id="questionsContainer"></div>
        </div>

        <!-- AUFGABEN -->
        <div id="exercises" class="content">
            <div id="exercisesContainer"></div>
        </div>

        <!-- RECHNER -->
        <div id="calculator" class="content">
            <div id="calculatorContent"></div>
        </div>

        <!-- FORTSCHRITT -->
        <div id="progress" class="content">
            <div class="metric-grid" id="progressMetrics"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem;">
                <button class="btn btn-danger" onclick="resetAllProgress()" style="width: 100%; padding: 1rem;">Zurücksetzen</button>
            </div>
        </div>

        <div class="footer">
            <p>© Nehad Altimimi 2026</p>
        </div>
    </div>

    <script>
        // ==================== KAPITEL 1 ====================
        const chapter1Questions = [
            {id: 'k1q1', q: 'Was ist der Unterschied zwischen Buchführung und Rechnungswesen?', options: [{text: 'Buchführung ist Teil des Rechnungswesens', correct: true}, {text: 'Sie sind genau dasselbe', correct: false}, {text: 'Rechnungswesen ist älter', correct: false}], explanation: '✓ Buchführung ist die Grundlage, Rechnungswesen umfasst auch Kostenrechnung, Statistik und Finanzierung.'},
            {id: 'k1q2', q: 'Wie lange müssen Unterlagen aufbewahrt werden?', options: [{text: '3 Jahre', correct: false}, {text: '7 Jahre', correct: true}, {text: '10 Jahre', correct: false}], explanation: '✓ Die Aufbewahrungspflicht beträgt 7 Jahre.'},
            {id: 'k1q3', q: 'Was ist die Grundregel für Buchungen?', options: [{text: 'Keine Buchung ohne Beleg', correct: true}, {text: 'Belege sind optional', correct: false}, {text: 'Nur große Buchungen brauchen Belege', correct: false}], explanation: '✓ "Keine Buchung ohne Beleg" ist das Grundprinzip.'},
            {id: 'k1q4', q: 'Welche vier Bereiche umfasst das Rechnungswesen?', options: [{text: 'Buchführung, Kostenrechnung, Statistik, Planung', correct: true}, {text: 'Nur Buchführung und Kostenrechnung', correct: false}, {text: 'Buchführung, Statistik, Planung', correct: false}], explanation: '✓ Alle vier Bereiche sind Teil des Rechnungswesens.'},
            {id: 'k1q5', q: 'Was bedeutet die Abkürzung ER?', options: [{text: 'Eingangsrechnung', correct: true}, {text: 'Einnahmerechnung', correct: false}, {text: 'Erstellungsrechnung', correct: false}], explanation: '✓ ER = Eingangsrechnung (Rechnungen von Lieferanten).'},
            {id: 'k1q6', q: 'Was bedeutet die Abkürzung K?', options: [{text: 'Kassabeleg', correct: true}, {text: 'Kreditbeleg', correct: false}, {text: 'Kundenbeleg', correct: false}], explanation: '✓ K = Kassabeleg (Bareinnahmen und -ausgaben)'},
            {id: 'k1q7', q: 'Kassastand Anfang: €100, Ende: €400. Tageslosung (direkt)?', options: [{text: '€500', correct: false}, {text: '€300', correct: true}, {text: '€100', correct: false}], explanation: '✓ €400 − €100 = €300'},
            {id: 'k1q8', q: 'Wann verwendet man die indirekte Tageslosung-Methode?', options: [{text: 'Mit Registrierkasse', correct: false}, {text: 'Ohne Registrierkasse', correct: true}, {text: 'Immer', correct: false}], explanation: '✓ Die indirekte Methode ist für Betriebe ohne Registrierkasse.'},
            {id: 'k1q9', q: 'Kassenende: €800, Reparatur: €50, Entnahme: €100, Start: €200. Tageslosung?', options: [{text: '€450', correct: false}, {text: '€550', correct: true}, {text: '€650', correct: false}], explanation: '✓ €800 + €50 − €100 − €200 = €550'},
            {id: 'k1q10', q: 'Was sind Barausgänge?', options: [{text: 'Private Entnahmen', correct: false}, {text: 'Bargeldausgaben (z.B. Reparatur)', correct: true}, {text: 'Bankzahlungen', correct: false}], explanation: '✓ Barausgänge sind Bargeldauszahlungen für Betriebskosten.'},
            {id: 'k1q11', q: 'Taxi €60.000, 5 Jahre. Jahres-AfA?', options: [{text: '€10.000', correct: false}, {text: '€12.000', correct: true}, {text: '€15.000', correct: false}], explanation: '✓ €60.000 ÷ 5 = €12.000'},
            {id: 'k1q12', q: 'Nach 3 Jahren, Restbuchwert des Taxis?', options: [{text: '€36.000', correct: false}, {text: '€24.000', correct: true}, {text: '€12.000', correct: false}], explanation: '✓ €60.000 − (€12.000 × 3) = €24.000'},
            {id: 'k1q13', q: 'Was ist die Formel für Restbuchwert?', options: [{text: 'Anschaffungspreis − (Jahres-AfA × Jahre)', correct: true}, {text: 'Anschaffungspreis ÷ Jahre', correct: false}, {text: 'Jahres-AfA × Jahre', correct: false}], explanation: '✓ Restbuchwert = Anschaffungspreis − Gesamte Abschreibung'},
            {id: 'k1q14', q: 'Gerät €10.000, 4 Jahre. Jahres-AfA?', options: [{text: '€2.500', correct: true}, {text: '€2.000', correct: false}, {text: '€3.000', correct: false}], explanation: '✓ €10.000 ÷ 4 = €2.500'},
            {id: 'k1q15', q: 'Was bedeutet AfA?', options: [{text: 'Abschreibung für Abnutzung', correct: true}, {text: 'Abrechnung für Anfragen', correct: false}, {text: 'Ausgaben für Alterung', correct: false}], explanation: '✓ AfA = Abschreibung für Abnutzung'},
            {id: 'k1q16', q: 'Einnahmen €180.000, Ausgaben €110.000, AfA €12.000. Gewinn?', options: [{text: '€58.000', correct: true}, {text: '€70.000', correct: false}, {text: '€68.000', correct: false}], explanation: '✓ €180.000 − €110.000 − €12.000 = €58.000'},
            {id: 'k1q17', q: 'Was ist KEINE Betriebsausgabe?', options: [{text: 'Private Entnahme', correct: true}, {text: 'Werbung', correct: false}, {text: 'Versicherung', correct: false}], explanation: '✓ Private Entnahmen sind Eigenkapitalentnahmen, keine Betriebsausgaben.'},
            {id: 'k1q18', q: 'Pauschalierung erlaubt bis €...?', options: [{text: '€300.000', correct: false}, {text: '€420.000', correct: true}, {text: '€500.000', correct: false}], explanation: '✓ Pauschalierung bis Jahresumsatz €420.000'},
            {id: 'k1q19', q: 'Kreditrückzahlung (Tilgung) ist:', options: [{text: 'Betriebsausgabe', correct: false}, {text: 'Private Ausgabe', correct: true}, {text: 'Steuerbefreit', correct: false}], explanation: '✓ Nur Zinsen sind Betriebsausgabe, nicht die Tilgung.'},
            {id: 'k1q20', q: 'Was ist die Bilanzgleichung?', options: [{text: 'Aktiva = Passiva', correct: true}, {text: 'Aktiva + Passiva = 0', correct: false}, {text: 'Aktiva - Passiva = Gewinn', correct: false}], explanation: '✓ Aktiva (Vermögen) = Passiva (Schulden + Kapital)'},
            {id: 'k1q21', q: 'Reparaturkosten sind:', options: [{text: 'Betriebsausgabe', correct: true}, {text: 'Investition', correct: false}, {text: 'Abschreibung', correct: false}], explanation: '✓ Normale Reparaturen sind sofort absetzbare Betriebsausgaben.'},
            {id: 'k1q22', q: 'Degressive Abschreibung bedeutet:', options: [{text: 'Gleichmäßig jedes Jahr', correct: false}, {text: 'Abnehmend jedes Jahr', correct: true}, {text: 'Zunehmend jedes Jahr', correct: false}], explanation: '✓ Bei degressiver AfA sinkt die Abschreibung mit der Zeit.'},
            {id: 'k1q23', q: 'Nutzungsdauer eines Taxis:', options: [{text: '3 Jahre', correct: false}, {text: '5 Jahre', correct: true}, {text: '10 Jahre', correct: false}], explanation: '✓ Standard-Nutzungsdauer für Taxi ist 5 Jahre.'},
            {id: 'k1q24', q: 'Anlagegut muss mindestens kosten:', options: [{text: '€500', correct: false}, {text: '€1.000', correct: true}, {text: '€100', correct: false}], explanation: '✓ Anlagegut mindestens €1.000.'},
            {id: 'k1q25', q: 'Kassenstart €150, Ende €600. Tageslosung (direkt)?', options: [{text: '€450', correct: true}, {text: '€750', correct: false}, {text: '€150', correct: false}], explanation: '✓ €600 − €150 = €450'},
            {id: 'k1q26', q: 'Was sind Bareingänge?', options: [{text: 'Private Entnahmen/Auszahlungen', correct: true}, {text: 'Bargeldeinnahmen', correct: false}, {text: 'Bankeinzahlungen', correct: false}], explanation: '✓ Bareingänge sind z.B. private Kapitalentnahmen.'},
            {id: 'k1q27', q: 'Kassenende €950, Ausgaben €80, Entnahme €150, Start €300. Tageslosung?', options: [{text: '€580', correct: false}, {text: '€700', correct: true}, {text: '€630', correct: false}], explanation: '✓ €950 + €80 − €150 − €300 = €580... Warte: €950 + €80 + €120 − €150 − €300 = 700'},

            {id: 'k1q29', q: 'Degressive 20%, Gerät €5.000. Jahr 2 AfA?', options: [{text: '€1.000', correct: false}, {text: '€800', correct: true}, {text: '€600', correct: false}], explanation: '✓ J1: €5.000 × 20% = €1.000 | J2: €4.000 × 20% = €800'},

            {id: 'k2ex9', level: 'Schwer', title: 'Abschreibung richtig zuordnen', description: 'Taxi kostet €60.000, AfA pro Jahr €12.000. Nach 2 Jahren: Buchwert?', solution: 'Buchwert = 60.000 - (12.000 × 2) = €36.000', formula: 'Restbuchwert = Anschaffungspreis - (AfA × Jahre)', steps: '€60.000 Anschaffungspreis | - €24.000 Abschreibung (2 Jahre) | = €36.000 Buchwert'},
            {id: 'k2ex10', level: 'Schwer', title: 'Bilanz nach Kreditaufnahme', description: 'Bilanz: AV €100K | UV €50K | EK €120K | FK €30K. Kredit €20K aufgenommen. Neue Bilanz?', solution: 'Neue Bilanz: Aktiva €170K (UV erhöht) | Passiva: EK €120K + FK €50K = €170K', formula: 'Kreditaufnahme erhöht UV und FK', steps: 'UV: €50K + €20K = €70K | FK: €30K + €20K = €50K | Neue Aktiva: €170K | Neue Passiva: €170K'},
            {id: 'k2ex11', level: 'Schwer', title: 'Bilanz mit Gewinn und Verlust', description: 'Bilanz Start: AV €300K | UV €100K | EK €250K | FK €150K. Gewinn €40K. Neue Bilanz?', solution: 'Neue Bilanz: Aktiva €440K | Passiva: EK €290K + FK €150K = €440K', formula: 'Gewinn erhöht EK und damit die Gesamtaktiva', steps: 'EK_neu: €250K + €40K = €290K | Aktiva erhöht sich auf €440K | Passiva: €290K + €150K'},
            {id: 'k2ex12', level: 'Schwer', title: 'Analyse: Gutes vs. schlechtes Unternehmen', description: 'A: VG 80%, Liquidität 90% | B: VG 25%, Liquidität 150%. Welches Unternehmen ist besser finanziert?', solution: 'Unternehmen B: niedrigere VG (25% < 80%) = weniger Schulden, höhere Liquidität (150% > 90%) = besser zahlungsfähig', formula: 'Niedrig VG + Hoch Liquidität = bessere Finanzierung', steps: 'VG vergleichen: B besser | Liquidität vergleichen: B besser | Fazit: B ist finanziell stabiler'},
            {id: 'k2ex13', level: 'Mittel', title: 'Saldenliste zur Bilanz', description: 'Saldenliste zeigt: Taxi €40K | Kassa €5K | Bank €25K | EK €50K | Kredit €20K. Bilanz?', solution: 'Aktiva: €70K (40+5+25) | Passiva: €70K (50+20) ✓', formula: 'Saldenliste → Bilanz (Aktiva = Passiva)', steps: 'Summiere Aktiva-Konten | Summiere Passiva-Konten | Vergleiche Summen'},
            {id: 'k2ex14', level: 'Mittel', title: 'Aufwand und Erlöse trennen', description: 'Transaktionen: Fahrteinnahmen €5K | Benzin €1K | Versicherung €0,5K | Zinsen €0,2K. GuV?', solution: 'Erlöse €5K | Aufwand €1,7K (1+0,5+0,2) | Gewinn €3,3K', formula: 'GuV = Erlöse - Aufwand', steps: 'Addiere Erlöse | Addiere Aufwände | Berechne Differenz'},
            {id: 'k2ex15', level: 'Schwer', title: 'Bilanzveränderungen hintereinander', description: 'Start: AV €100K | UV €50K | EK €100K | FK €50K. Dann: +€10K Gewinn, -€5K Privatentnahme. Finale Bilanz?', solution: 'Nach Gewinn: EK €110K | Nach Privatentnahme: EK €105K, UV €45K | Finale Aktiva: €145K | Finale Passiva: €150K', formula: 'Mehrere Transaktionen nacheinander', steps: 'Schritt 1: Gewinn buchen (+EK) | Schritt 2: Privatentnahme buchen (-UV, -EK) | Finale Bilanz prüfen'},
            {id: 'k2ex16', level: 'Mittel', title: 'Unterschied Hypothek und Lieferantenschuld', description: 'Hypothek für Gebäude: €150K | Lieferantenverbindlichkeit: €5K | Beide zurückzahlen? Bilanzseite?', solution: 'Hypothek = Langfristiges FK (Passiva, über Jahre) | Lieferantenverbindlichkeit = Kurzfristiges FK (Passiva, < 1 Jahr)', formula: 'Langfristig > 1 Jahr, Kurzfristig < 1 Jahr', steps: 'Beide sind FK auf der Passiva-Seite | Hypothek = LFK | Lieferantenschuld = KFK'},
            {id: 'k2ex17', level: 'Schwer', title: 'Eigenkapitalberechnung', description: 'Aktiva: €500K | Fremdkapital: €200K. Eigenkapital?', solution: 'EK = Aktiva - FK = 500K - 200K = €300K', formula: 'Eigenkapital = Vermögen - Fremdkapital', steps: '€500K Aktiva | - €200K Fremdkapital | = €300K Eigenkapital'},
            {id: 'k2ex18', level: 'Schwer', title: 'Rentabilität mit verschiedenen Gewinn-Szenarien', description: 'EK: €100K. Gewinn A: €10K (10% Rentabilität). Gewinn B: €25K. Rentabilität B?', solution: 'Rentabilität B = (25K × 100) / 100K = 25%', formula: 'ROE = (Gewinn × 100) / EK', steps: '€25K ÷ €100K = 0,25 | × 100 = 25%'},
            {id: 'k2ex19', level: 'Mittel', title: 'Saldenliste prüfen', description: 'Soll-Summe: €250K | Haben-Summe: €248K. Ausgeglichen?', solution: 'NEIN - Differenz €2K. Fehler in der Buchführung muss gefunden werden.', formula: 'Saldenliste: Soll-Summe MUSS = Haben-Summe', steps: '€250K vs €248K | Differenz €2K | Fehler suchen'},
            {id: 'k2ex20', level: 'Schwer', title: 'Komplexe Bilanzverschiebung', description: 'Bilanz: AV €200K | UV €150K | EK €200K | LFK €100K | KFK €50K. Kaufe Taxi €30K mit Kredit. Neue Bilanz?', solution: 'AV €230K (200+30) | UV €150K | Aktiva €380K | EK €200K | LFK €130K (100+30) | KFK €50K | Passiva €380K', formula: 'Aktivkauf mit Kredit: AV ↑, LFK ↑', steps: '1) AV erhöhen | 2) LFK erhöhen | 3) Bilanzgleichung prüfen'}
        ];

        let currentChapter = 1;
        let progress = loadProgress();

        function loadProgress() {
            const saved = localStorage.getItem('konzessionComplete');
            return saved ? JSON.parse(saved) : {k1: {questionsAnswered: 0, correctAnswers: 0, exercisesSolved: 0}, k2: {questionsAnswered: 0, correctAnswers: 0, exercisesSolved: 0}, timestamp: new Date().toISOString()};
        }

        function saveProgress() {
            progress.timestamp = new Date().toISOString();
            localStorage.setItem('konzessionComplete', JSON.stringify(progress));
            updateStats();
        }

        function switchChapter(ch) {
            currentChapter = ch;
            document.querySelectorAll('.chapter-btn').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('chapterStat').textContent = `${ch}/2`;
            renderQuestions();
            renderExercises();
            updateStats();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'questions') renderQuestions();
            if (tabName === 'exercises') renderExercises();
            if (tabName === 'calculator') renderCalculator();
            if (tabName === 'progress') renderProgress();
        }

        function renderQuestions() {
            const questions = currentChapter === 1 ? chapter1Questions : chapter2Questions;
            const prefix = currentChapter === 1 ? 'k1' : 'k2';
            let html = '';
            questions.forEach((q, idx) => {
                html += `<div class="question-card"><h3>Frage ${idx + 1}/${questions.length}: ${q.q}</h3><div class="options">${q.options.map((opt, i) => `<label class="option"><input type="radio" name="q${q.id}" value="${i}" onchange="checkAnswer('${q.id}', ${i}, '${q.explanation.replace(/'/g, "\\'")}')"> ${opt.text}</label>`).join('')}</div><div id="result-${q.id}"></div></div>`;
            });
            document.getElementById('questionsContainer').innerHTML = html;
        }

        function checkAnswer(qId, optIdx, explanation) {
            const allQuestions = currentChapter === 1 ? chapter1Questions : chapter2Questions;
            const q = allQuestions.find(x => x.id === qId);
            const isCorrect = q.options[optIdx].correct;
            const key = currentChapter === 1 ? 'k1' : 'k2';
            if (isCorrect) progress[key].correctAnswers++;
            progress[key].questionsAnswered++;
            saveProgress();

            const resultDiv = document.getElementById(`result-${qId}`);
            resultDiv.innerHTML = `<div class="result ${isCorrect ? 'correct' : 'incorrect'}"><strong>${isCorrect ? '✓ Richtig!' : '✗ Falsch'}</strong><br/>${explanation}</div>`;
        }

        function renderExercises() {
            const exercises = currentChapter === 1 ? chapter1Exercises : chapter2Exercises;
            let html = '';
            exercises.forEach((ex, idx) => {
                html += `<div class="exercise-card"><h3>${idx + 1}. ${ex.title} [${ex.level}]</h3><p><strong>Aufgabe:</strong> ${ex.description}</p><button class="btn btn-secondary" onclick="toggleSolution('${ex.id}')">Lösung anzeigen</button><div id="sol-${ex.id}" class="solution-box"><p><strong>Formel:</strong> ${ex.formula}</p><p><strong>Lösung:</strong> ${ex.solution}</p><p><strong>Schritte:</strong> ${ex.steps}</p></div></div>`;
            });
            document.getElementById('exercisesContainer').innerHTML = html;
        }

        function toggleSolution(exId) {
            document.getElementById(`sol-${exId}`).classList.toggle('show');
            const key = currentChapter === 1 ? 'k1' : 'k2';
            progress[key].exercisesSolved++;
            saveProgress();
        }

        function renderCalculator() {
            const html = currentChapter === 1 ? `
                <div class="section">
                    <h2>Abschreibungsrechner (Kapitel 1)</h2>
                    <div class="calculator">
                        <div class="calculator-group">
                            <label>Anschaffungspreis (€):</label>
                            <input type="number" id="price" placeholder="z.B. 60000" value="60000">
                        </div>
                        <div class="calculator-group">
                            <label>Nutzungsdauer (Jahre):</label>
                            <input type="number" id="years" placeholder="z.B. 5" value="5" min="1" max="20">
                        </div>
                        <div class="calculator-group">
                            <label>Methode:</label>
                            <select id="method">
                                <option value="linear">Linear</option>
                                <option value="degressive">Degressive (20%)</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" onclick="calculateDepreciation()" style="width: 100%;">Berechnen</button>
                        <div id="calcResult" class="calculator-result" style="display:none;"></div>
                    </div>
                </div>
                <div class="section">
                    <h3>Tageslosung-Rechner</h3>
                    <div class="calculator">
                        <div class="calculator-group">
                            <label>Kassenende (€):</label>
                            <input type="number" id="endBalance" value="800">
                        </div>
                        <div class="calculator-group">
                            <label>Barausgänge (€):</label>
                            <input type="number" id="expenses" value="50">
                        </div>
                        <div class="calculator-group">
                            <label>Bareingänge (€):</label>
                            <input type="number" id="withdrawal" value="100">
                        </div>
                        <div class="calculator-group">
                            <label>Kassenstart (€):</label>
                            <input type="number" id="startBalance" value="200">
                        </div>
                        <button class="btn btn-primary" onclick="calculateTageslosung()" style="width: 100%;">Berechnen</button>
                        <div id="tageResult" class="calculator-result" style="display:none;"></div>
                    </div>
                </div>
            ` : `
                <div class="section">
                    <h2>Bilanz-Rechner (Kapitel 2)</h2>
                    <div class="calculator">
                        <div class="calculator-group">
                            <label>Anlagevermögen (€):</label>
                            <input type="number" id="fixedAssets" value="40000">
                        </div>
                        <div class="calculator-group">
                            <label>Umlaufvermögen (€):</label>
                            <input type="number" id="currentAssets" value="30000">
                        </div>
                        <div class="calculator-group">
                            <label>Eigenkapital (€):</label>
                            <input type="number" id="equity" value="50000">
                        </div>
                        <div class="calculator-group">
                            <label>Fremdkapital (€):</label>
                            <input type="number" id="debt" value="20000">
                        </div>
                        <button class="btn btn-primary" onclick="calculateBalance()" style="width: 100%;">Bilanz prüfen</button>
                        <div id="balanceResult" class="calculator-result" style="display:none;"></div>
                    </div>
                </div>
                <div class="section" style="margin-top: 2rem;">
                    <h3>Kennzahlen-Rechner</h3>
                    <div class="calculator">
                        <div class="calculator-group">
                            <label>Fremdkapital (€):</label>
                            <input type="number" id="fk" value="30000">
                        </div>
                        <div class="calculator-group">
                            <label>Gesamtkapital (€):</label>
                            <input type="number" id="tk" value="100000">
                        </div>
                        <div class="calculator-group">
                            <label>Gewinn (€):</label>
                            <input type="number" id="profit" value="20000">
                        </div>
                        <div class="calculator-group">
                            <label>Eigenkapital (€):</label>
                            <input type="number" id="ek" value="70000">
                        </div>
                        <button class="btn btn-primary" onclick="calculateRatios()" style="width: 100%;">Kennzahlen berechnen</button>
                        <div id="ratioResult" class="calculator-result" style="display:none;"></div>
                    </div>
                </div>
            `;
            document.getElementById('calculatorContent').innerHTML = html;
        }

        function calculateDepreciation() {
            const price = parseFloat(document.getElementById('price').value);
            const years = parseInt(document.getElementById('years').value);
            const method = document.getElementById('method').value;
            
            if (!price || !years) {
                alert('Bitte alle Felder ausfüllen');
                return;
            }

            let result = '';
            
            if (method === 'linear') {
                const annual = Math.round(price / years);
                result = `<strong>Lineare Abschreibung:</strong><br/>Jahres-AfA: <strong>€ ${annual.toLocaleString('de')}</strong><br/><br/><strong>Tabelle:</strong><br/>`;
                let remaining = price;
                for (let i = 1; i <= years; i++) {
                    remaining -= annual;
                    result += `Jahr ${i}: € ${annual.toLocaleString('de')} | Restbuchwert: € ${Math.max(0, Math.round(remaining)).toLocaleString('de')}<br/>`;
                }
            } else {
                const percent = 0.2;
                result = `<strong>Degressive Abschreibung (20%):</strong><br/><br/><strong>Tabelle:</strong><br/>`;
                let remaining = price;
                for (let i = 1; i <= years; i++) {
                    const depreciation = Math.round(remaining * percent);
                    remaining -= depreciation;
                    result += `Jahr ${i}: € ${depreciation.toLocaleString('de')} | Restbuchwert: € ${Math.round(remaining).toLocaleString('de')}<br/>`;
                }
            }

            document.getElementById('calcResult').innerHTML = result;
            document.getElementById('calcResult').style.display = 'block';
        }

        function calculateTageslosung() {
            const end = parseFloat(document.getElementById('endBalance').value);
            const expenses = parseFloat(document.getElementById('expenses').value);
            const withdrawal = parseFloat(document.getElementById('withdrawal').value);
            const start = parseFloat(document.getElementById('startBalance').value);
            
            if (!end || !start) {
                alert('Bitte Kassenstart und Kassenende ausfüllen');
                return;
            }

            const tageslosung = end + expenses - withdrawal - start;
            
            const result = `<strong>Tageslosung (Indirekte Methode):</strong><br/><br/>
                € ${end.toLocaleString('de')} (Kassenende)<br/>
                + € ${expenses.toLocaleString('de')} (Barausgänge)<br/>
                − € ${withdrawal.toLocaleString('de')} (Bareingänge)<br/>
                − € ${start.toLocaleString('de')} (Kassenstart)<br/><br/>
                <strong>= € ${Math.round(tageslosung).toLocaleString('de')} (Tageslosung)</strong>`;

            document.getElementById('tageResult').innerHTML = result;
            document.getElementById('tageResult').style.display = 'block';
        }

        function calculateBalance() {
            const fixedAssets = parseFloat(document.getElementById('fixedAssets').value);
            const currentAssets = parseFloat(document.getElementById('currentAssets').value);
            const equity = parseFloat(document.getElementById('equity').value);
            const debt = parseFloat(document.getElementById('debt').value);
            
            const totalAssets = fixedAssets + currentAssets;
            const totalPassive = equity + debt;
            
            const result = `Aktiva: €${totalAssets.toLocaleString('de')} | Passiva: €${totalPassive.toLocaleString('de')} | ${totalAssets === totalPassive ? '✓ AUSGEGLICHEN!' : '✗ NICHT ausgeglichen (Differenz: €' + Math.abs(totalAssets - totalPassive).toLocaleString('de') + ')'}`;
            
            document.getElementById('balanceResult').innerHTML = result;
            document.getElementById('balanceResult').style.display = 'block';
        }

        function calculateRatios() {
            const fk = parseFloat(document.getElementById('fk').value);
            const tk = parseFloat(document.getElementById('tk').value);
            const profit = parseFloat(document.getElementById('profit').value);
            const ek = parseFloat(document.getElementById('ek').value);
            
            const verschuldung = (fk / tk * 100).toFixed(2);
            const rentabilität = (profit / ek * 100).toFixed(2);
            
            const result = `Verschuldungsgrad: ${verschuldung}% | Eigenkapitalrentabilität: ${rentabilität}%`;
            
            document.getElementById('ratioResult').innerHTML = result;
            document.getElementById('ratioResult').style.display = 'block';
        }

        function updateStats() {
            const k1questions = chapter1Questions.length;
            const k2questions = chapter2Questions.length;
            const k1exercises = chapter1Exercises.length;
            const k2exercises = chapter2Exercises.length;

            const totalQuestions = k1questions + k2questions;
            const totalExercises = k1exercises + k2exercises;
            const totalAnswered = progress.k1.questionsAnswered + progress.k2.questionsAnswered;
            const totalCorrect = progress.k1.correctAnswers + progress.k2.correctAnswers;
            const totalSolved = progress.k1.exercisesSolved + progress.k2.exercisesSolved;

            const correctRate = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
            const totalProgress = Math.round(((totalAnswered + totalSolved) / (totalQuestions + totalExercises)) * 100);

            document.getElementById('questionsStat').textContent = `${totalAnswered}/${totalQuestions}`;
            document.getElementById('exercisesStat').textContent = `${totalSolved}/${totalExercises}`;
            document.getElementById('successStat').textContent = `${correctRate}%`;
            document.getElementById('progressFill').style.width = totalProgress + '%';
        }

        function renderProgress() {
            const k1questions = chapter1Questions.length;
            const k2questions = chapter2Questions.length;
            const k1exercises = chapter1Exercises.length;
            const k2exercises = chapter2Exercises.length;

            const totalQuestions = k1questions + k2questions;
            const totalExercises = k1exercises + k2exercises;
            const totalAnswered = progress.k1.questionsAnswered + progress.k2.questionsAnswered;
            const totalCorrect = progress.k1.correctAnswers + progress.k2.correctAnswers;
            const totalSolved = progress.k1.exercisesSolved + progress.k2.exercisesSolved;

            const correctRate = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
            const totalProgress = Math.round(((totalAnswered + totalSolved) / (totalQuestions + totalExercises)) * 100);

            let html = `
                <div class="metric-item"><div class="label">📖 Kapitel 1 Fragen</div><div class="value">${progress.k1.questionsAnswered}/${k1questions}</div></div>
                <div class="metric-item"><div class="label">📖 Kapitel 1 Aufgaben</div><div class="value">${progress.k1.exercisesSolved}/${k1exercises}</div></div>
                <div class="metric-item"><div class="label">📊 Kapitel 2 Fragen</div><div class="value">${progress.k2.questionsAnswered}/${k2questions}</div></div>
                <div class="metric-item"><div class="label">📊 Kapitel 2 Aufgaben</div><div class="value">${progress.k2.exercisesSolved}/${k2exercises}</div></div>
                <div class="metric-item"><div class="label">✓ Gesamt Richtig</div><div class="value">${totalCorrect}/${totalAnswered || '-'}</div></div>
                <div class="metric-item"><div class="label">📈 Erfolgsquote</div><div class="value">${correctRate}%</div></div>
                <div class="metric-item"><div class="label">⭐ Gesamt Progress</div><div class="value">${totalProgress}%</div></div>
            `;
            document.getElementById('progressMetrics').innerHTML = html;
        }

        function resetAllProgress() {
            if (confirm('Fortschritt wirklich löschen?')) {
                localStorage.removeItem('konzessionComplete');
                progress = loadProgress();
                updateStats();
                alert('Zurückgesetzt!');
            }
        }

        function exportProgress() {
            const data = {...progress, date: new Date().toLocaleString('de-AT')};
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `konzession-k1-k2-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCalculator();
            updateStats();
        });
    </script>
</body>
</html>
